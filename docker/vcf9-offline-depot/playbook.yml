---
- name: Deploy VCF9 Offline Depot
  hosts: localhost
  connection: local
  become: yes

  vars:
    install_dir: /opt/vcf9-offline-depot
    docker_gpg_path: /etc/apt/keyrings/docker.gpg
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_gpg_armored_path: /etc/apt/keyrings/docker.asc
    allow_reboot: false

  module_defaults:
    ansible.builtin.file:
      owner: root
      group: root
    ansible.builtin.copy:
      owner: root
      group: root

  pre_tasks:
    - name: Verify target is Ubuntu
      ansible.builtin.assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook only supports Ubuntu (found {{ ansible_distribution }})"

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - domain is defined and domain | length > 0
          - subdomain is defined and subdomain | length > 0
          - cf_dns_api_token is defined and cf_dns_api_token | length > 0
          - basicauth_users is defined and basicauth_users | length > 0
        fail_msg: "'domain', 'subdomain', 'cf_dns_api_token' and 'basicauth_users' must be provided"

    - name: Detect system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Set Docker repository URL
      ansible.builtin.set_fact:
        docker_repo: >-
          deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_gpg_path }}]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable

  tasks:
    # ─── Docker Installation ─────────────────────────────
    - name: Ensure required system packages are present
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    # NOTE: allow_reboot defaults to false. If the VM has pending kernel
    # updates, Docker may fail to install. Re-run with -e allow_reboot=true
    # or reboot manually first.
    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot the machine if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible due to package upgrade."
        pre_reboot_delay: 10
        reboot_timeout: 600
        post_reboot_delay: 30
      when: reboot_required.stat.exists and allow_reboot | bool

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_gpg_armored_path }}"
        mode: "0644"
        force: false

    # TROUBLESHOOT: If this fails with "invalid packet", delete both
    # {{ docker_gpg_path }} and {{ docker_gpg_armored_path }} then re-run.
    - name: Dearmor Docker GPG key
      ansible.builtin.command: gpg --dearmor -o {{ docker_gpg_path }} {{ docker_gpg_armored_path }}
      args:
        creates: "{{ docker_gpg_path }}"

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: "{{ docker_gpg_path }}"
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_repo }}"
        filename: docker
        state: present

    - name: Install Docker Engine and related packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: yes
      notify: Start Docker service

    # IMPORTANT: Docker must be running before compose files are deployed.
    # If this step is removed, the "Start the stack" task will fail.
    - name: Flush handlers to ensure Docker is running
      ansible.builtin.meta: flush_handlers

    # ─── Stack Directory Structure ───────────────────────
    - name: Create stack directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ install_dir }}"
        - "{{ install_dir }}/compose"
        - "{{ install_dir }}/traefik"
        - "{{ install_dir }}/nginx"

    # NOTE: Owned by SUDO_USER so the calling user can write files here
    # without sudo. If SUDO_USER is unset (e.g. running as root directly),
    # ownership falls back to root.
    - name: Create vcf directory
      ansible.builtin.file:
        path: /vcf
        state: directory
        mode: "0755"
        owner: "{{ lookup('env', 'SUDO_USER') | default('root', true) }}"
        group: "{{ lookup('env', 'SUDO_USER') | default('root', true) }}"

    # ─── Nginx Configuration ────────────────────────────
    # TROUBLESHOOT: If nginx starts but Traefik ignores it, check the
    # container healthcheck. Autoindex returns 200 for directory listings
    # but some healthcheck methods may not handle this correctly.
    # Verify with: docker exec nginx-web wget -q --spider http://localhost/
    - name: Create nginx config with directory browsing
      ansible.builtin.copy:
        dest: "{{ install_dir }}/nginx/default.conf"
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              root /usr/share/nginx/html;
              index index.html index.htm;

              location / {
                  autoindex on;
                  autoindex_exact_size off;
                  autoindex_localtime on;
                  try_files $uri $uri/ =404;
              }
          }

    # ─── Compose Files ───────────────────────────────────
    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: docker-compose.yml
        dest: "{{ install_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy compose layer files
      ansible.builtin.copy:
        src: "compose/"
        dest: "{{ install_dir }}/compose/"
        mode: "0644"

    # ─── Traefik Static Configuration ────────────────────
    - name: Template Traefik static configuration
      ansible.builtin.copy:
        dest: "{{ install_dir }}/traefik/traefik.yml"
        mode: "0644"
        content: |
          api:
            dashboard: true
            insecure: false

          ping:
            entryPoint: traefik

          entryPoints:
            web:
              address: ":80"
            websecure:
              address: ":443"
              http:
                tls:
                  certResolver: cloudflare
                  domains:
                    - main: "{{ domain }}"
                      sans:
                        - "*.{{ domain }}"
            traefik:
              address: ":8080"

          # TROUBLESHOOT: Certs not issuing?
          #   1. Verify token: curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
          #        -H "Authorization: Bearer <token>"
          #   2. Token needs: Zone:DNS:Edit + Zone:Zone:Read permissions
          #   3. Check logs: docker logs traefik 2>&1 | grep -i acme
          #   4. If stuck with staging cert, truncate acme.json and restart:
          #      truncate -s 0 {{ install_dir }}/traefik/acme.json
          certificatesResolvers:
            cloudflare:
              acme:
                email: "admin@{{ domain }}"
                storage: /acme/acme.json
                dnsChallenge:
                  provider: cloudflare
                  resolvers:
                    - "1.1.1.1:53"
                    - "1.0.0.1:53"

          providers:
            docker:
              endpoint: "unix:///var/run/docker.sock"
              exposedByDefault: false
              network: traefik

          log:
            level: INFO

    - name: Create acme.json with secure permissions
      ansible.builtin.file:
        path: "{{ install_dir }}/traefik/acme.json"
        state: touch
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    # ─── Environment File ────────────────────────────────
    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ install_dir }}/.env"
        mode: "0600"
        content: |
          DOMAIN={{ domain }}
          SUBDOMAIN={{ subdomain }}
          CF_DNS_API_TOKEN={{ cf_dns_api_token }}
          BASICAUTH_USERS={{ basicauth_users }}
          INSTALL_DIR={{ install_dir }}

    # ─── Default Web Page ────────────────────────────────
    # NOTE: force: false means this landing page is only written on first
    # deploy. Remove /vcf/index.html (or replace it) once real depot content
    # is in place so Nginx's autoindex serves the bundle directory listing.
    - name: Create default index.html if none exists
      ansible.builtin.copy:
        dest: /vcf/index.html
        mode: "0644"
        force: false
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="robots" content="noindex, nofollow">
            <title>VCF9 Offline Depot — {{ subdomain }}.{{ domain }}</title>
            <style>
              :root {
                --bg: #0b1220;
                --bg-card: #111a2e;
                --border: #1f2b44;
                --text: #e6edf7;
                --text-muted: #8b97ad;
                --accent: #00a8ff;
                --accent-soft: rgba(0, 168, 255, 0.12);
                --success: #3fb950;
                --success-soft: rgba(63, 185, 80, 0.12);
              }
              @media (prefers-color-scheme: light) {
                :root {
                  --bg: #f7f9fc;
                  --bg-card: #ffffff;
                  --border: #e3e8f0;
                  --text: #0b1220;
                  --text-muted: #5d6b82;
                  --accent: #0070d1;
                  --accent-soft: rgba(0, 112, 209, 0.08);
                  --success: #1a7f37;
                  --success-soft: rgba(26, 127, 55, 0.1);
                }
              }
              * { box-sizing: border-box; }
              html, body { margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                             "Helvetica Neue", Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                -webkit-font-smoothing: antialiased;
              }
              main {
                flex: 1;
                max-width: 860px;
                margin: 0 auto;
                padding: 4rem 1.5rem 3rem;
                width: 100%;
              }
              header { margin-bottom: 2.5rem; }
              .eyebrow {
                font-size: 0.75rem;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 0.5rem;
              }
              h1 {
                font-size: clamp(1.75rem, 5vw, 2.5rem);
                font-weight: 700;
                margin: 0 0 0.5rem 0;
                letter-spacing: -0.02em;
              }
              .domain {
                font-size: 1rem;
                color: var(--text-muted);
                font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
              }
              .status {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                background: var(--success-soft);
                color: var(--success);
                padding: 0.4rem 0.85rem;
                border-radius: 999px;
                font-size: 0.8rem;
                font-weight: 600;
                margin-top: 1.25rem;
              }
              .status::before {
                content: "";
                width: 0.5rem;
                height: 0.5rem;
                border-radius: 50%;
                background: var(--success);
                animation: pulse 2s infinite;
              }
              @keyframes pulse {
                0%   { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.55); }
                70%  { box-shadow: 0 0 0 8px rgba(63, 185, 80, 0); }
                100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
              }
              .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
                margin-bottom: 2.5rem;
              }
              .card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 1.25rem;
              }
              .card-label {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--text-muted);
                margin-bottom: 0.5rem;
                font-weight: 600;
              }
              .card-value {
                font-size: 1rem;
                font-weight: 600;
                font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
                word-break: break-word;
              }
              section h2 {
                font-size: 1.2rem;
                margin: 0 0 1rem 0;
                font-weight: 600;
              }
              ol.steps {
                list-style: none;
                counter-reset: step;
                padding: 0;
                margin: 0 0 2rem 0;
              }
              ol.steps li {
                counter-increment: step;
                position: relative;
                padding: 1rem 1.25rem 1rem 3.5rem;
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 10px;
                margin-bottom: 0.75rem;
              }
              ol.steps li::before {
                content: counter(step);
                position: absolute;
                left: 1rem;
                top: 50%;
                transform: translateY(-50%);
                width: 1.75rem;
                height: 1.75rem;
                border-radius: 50%;
                background: var(--accent-soft);
                color: var(--accent);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 0.85rem;
              }
              code {
                background: var(--accent-soft);
                color: var(--accent);
                padding: 0.1rem 0.45rem;
                border-radius: 4px;
                font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
                font-size: 0.9em;
              }
              footer {
                border-top: 1px solid var(--border);
                padding: 1.5rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.85rem;
              }
              footer a {
                color: var(--accent);
                text-decoration: none;
              }
              footer a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <main>
              <header>
                <div class="eyebrow">VMware Cloud Foundation</div>
                <h1>VCF9 Offline Depot</h1>
                <div class="domain">{{ subdomain }}.{{ domain }}</div>
                <div class="status">Deployed &amp; ready</div>
              </header>

              <div class="cards">
                <div class="card">
                  <div class="card-label">Endpoint</div>
                  <div class="card-value">{{ subdomain }}.{{ domain }}</div>
                </div>
                <div class="card">
                  <div class="card-label">TLS</div>
                  <div class="card-value">Let's Encrypt</div>
                </div>
                <div class="card">
                  <div class="card-label">Reverse Proxy</div>
                  <div class="card-value">Traefik</div>
                </div>
                <div class="card">
                  <div class="card-label">File Server</div>
                  <div class="card-value">Nginx</div>
                </div>
              </div>

              <section>
                <h2>Next steps</h2>
                <ol class="steps">
                  <li>Drop your VCF installer bundles into <code>/vcf</code> on this host.</li>
                  <li>Point the VCF Installer at <code>https://{{ subdomain }}.{{ domain }}</code> as your offline depot URL.</li>
                  <li>Remove or replace <code>/vcf/index.html</code> so Nginx serves the bundle directory listing at the root instead of this page.</li>
                </ol>
              </section>
            </main>

            <footer>
              Deployed from
              <a href="https://github.com/jameskilbynet/iac/tree/main/docker/vcf9-offline-depot" rel="noopener">jameskilbynet/iac</a>
              &middot;
              built by <a href="https://wordpress.jameskilby.cloud" rel="noopener">@jameskilbynet</a>
            </footer>
          </body>
          </html>

    # ─── Create Docker Network ────────────────────────────
    # NOTE: The traefik network is declared as 'external: true' in the
    # compose files, so it must exist before docker compose up. This task
    # is idempotent -- safe to re-run if network already exists.
    - name: Create traefik Docker network
      ansible.builtin.command:
        cmd: docker network create traefik
      register: network_create
      changed_when: network_create.rc == 0
      failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr

    # ─── Start Stack ─────────────────────────────────────
    # TROUBLESHOOT: If containers start but Traefik doesn't discover them:
    #   1. Check both containers are on the traefik network:
    #      docker network inspect traefik | grep -E "Name|IPv4"
    #   2. Check labels are present:
    #      docker inspect nginx-web --format '{{json .Config.Labels}}'
    #   3. Check Traefik can talk to Docker:
    #      docker logs traefik 2>&1 | grep -i error
    #   4. If API version mismatch, ensure traefik:latest is used (not v3.3/v3.4)
    - name: Start the stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ install_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"

    - name: Show stack status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ install_dir }}"
      register: compose_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        var: compose_ps.stdout_lines

  handlers:
    - name: Start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
