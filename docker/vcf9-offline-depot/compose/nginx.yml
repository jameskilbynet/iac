---
services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /vcf:/usr/share/nginx/html:ro
      - ${INSTALL_DIR}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.nginx.rule: Host(`${SUBDOMAIN}.${DOMAIN}`)
      traefik.http.routers.nginx.entrypoints: websecure
      traefik.http.routers.nginx.tls.certresolver: cloudflare
      traefik.http.routers.nginx.tls.domains[0].main: "${DOMAIN}"
      traefik.http.routers.nginx.tls.domains[0].sans: "*.${DOMAIN}"
      traefik.http.routers.nginx.middlewares: nginx-auth
      traefik.http.middlewares.nginx-auth.basicauth.users: "${BASICAUTH_USERS}"
      traefik.http.services.nginx.loadbalancer.server.port: "80"
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: nginx-web

networks:
  traefik:
    external: true
