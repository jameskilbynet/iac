---
- name: Deploy Traefik + Nginx web stack
  hosts: localhost
  connection: local
  become: yes

  vars:
    install_dir: /opt/traefik-nginx
    docker_gpg_path: /etc/apt/keyrings/docker.gpg
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_gpg_armored_path: /etc/apt/keyrings/docker.asc
    allow_reboot: false

  module_defaults:
    ansible.builtin.file:
      owner: root
      group: root
    ansible.builtin.copy:
      owner: root
      group: root

  pre_tasks:
    - name: Verify target is Ubuntu
      ansible.builtin.assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook only supports Ubuntu (found {{ ansible_distribution }})"

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - domain is defined and domain | length > 0
          - cf_dns_api_token is defined and cf_dns_api_token | length > 0
        fail_msg: "Both 'domain' and 'cf_dns_api_token' must be provided"

    - name: Detect system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Set Docker repository URL
      ansible.builtin.set_fact:
        docker_repo: >-
          deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_gpg_path }}]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable

  tasks:
    # ─── Docker Installation ─────────────────────────────
    - name: Ensure required system packages are present
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot the machine if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible due to package upgrade."
        pre_reboot_delay: 10
        reboot_timeout: 600
        post_reboot_delay: 30
      when: reboot_required.stat.exists and allow_reboot | bool

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_gpg_armored_path }}"
        mode: "0644"
        force: false

    - name: Dearmor Docker GPG key
      ansible.builtin.command: gpg --dearmor -o {{ docker_gpg_path }} {{ docker_gpg_armored_path }}
      args:
        creates: "{{ docker_gpg_path }}"

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: "{{ docker_gpg_path }}"
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_repo }}"
        filename: docker
        state: present

    - name: Install Docker Engine and related packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: yes
      notify: Start Docker service

    - name: Flush handlers to ensure Docker is running
      ansible.builtin.meta: flush_handlers

    # ─── Stack Directory Structure ───────────────────────
    - name: Create stack directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ install_dir }}"
        - "{{ install_dir }}/compose"
        - "{{ install_dir }}/traefik"
        - "{{ install_dir }}/nginx"

    - name: Create vcf directory
      ansible.builtin.file:
        path: /vcf
        state: directory
        mode: "0755"
        owner: "{{ lookup('env', 'SUDO_USER') | default('root', true) }}"
        group: "{{ lookup('env', 'SUDO_USER') | default('root', true) }}"

    # ─── Nginx Configuration ────────────────────────────
    - name: Create nginx config with directory browsing
      ansible.builtin.copy:
        dest: "{{ install_dir }}/nginx/default.conf"
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              root /usr/share/nginx/html;
              index index.html index.htm;

              location / {
                  autoindex on;
                  autoindex_exact_size off;
                  autoindex_localtime on;
                  try_files $uri $uri/ =404;
              }
          }

    # ─── Compose Files ───────────────────────────────────
    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: docker-compose.yml
        dest: "{{ install_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy compose layer files
      ansible.builtin.copy:
        src: "compose/"
        dest: "{{ install_dir }}/compose/"
        mode: "0644"

    # ─── Traefik Static Configuration ────────────────────
    - name: Template Traefik static configuration
      ansible.builtin.copy:
        dest: "{{ install_dir }}/traefik/traefik.yml"
        mode: "0644"
        content: |
          api:
            dashboard: true
            insecure: false

          ping:
            entryPoint: traefik

          entryPoints:
            web:
              address: ":80"
            websecure:
              address: ":443"
              http:
                tls:
                  certResolver: cloudflare
                  domains:
                    - main: "{{ domain }}"
                      sans:
                        - "*.{{ domain }}"
            traefik:
              address: ":8080"

          certificatesResolvers:
            cloudflare:
              acme:
                email: "admin@{{ domain }}"
                storage: /acme/acme.json
                dnsChallenge:
                  provider: cloudflare
                  resolvers:
                    - "1.1.1.1:53"
                    - "1.0.0.1:53"

          providers:
            docker:
              endpoint: "unix:///var/run/docker.sock"
              exposedByDefault: false
              network: traefik

          log:
            level: INFO

    - name: Create acme.json with secure permissions
      ansible.builtin.file:
        path: "{{ install_dir }}/traefik/acme.json"
        state: touch
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    # ─── Environment File ────────────────────────────────
    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ install_dir }}/.env"
        mode: "0600"
        content: |
          DOMAIN={{ domain }}
          CF_DNS_API_TOKEN={{ cf_dns_api_token }}
          INSTALL_DIR={{ install_dir }}

    # ─── Default Web Page ────────────────────────────────
    - name: Create default index.html if none exists
      ansible.builtin.copy:
        dest: /vcf/index.html
        mode: "0644"
        force: false
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>{{ domain }}</title></head>
          <body>
            <h1>{{ domain }}</h1>
            <p>Traefik + Nginx stack deployed successfully.</p>
          </body>
          </html>

    # ─── Create Docker Network ────────────────────────────
    - name: Create traefik Docker network
      ansible.builtin.command:
        cmd: docker network create traefik
      register: network_create
      changed_when: network_create.rc == 0
      failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr

    # ─── Start Stack ─────────────────────────────────────
    - name: Start the stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ install_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"

    - name: Show stack status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ install_dir }}"
      register: compose_ps
      changed_when: false

    - name: Display running containers
      ansible.builtin.debug:
        var: compose_ps.stdout_lines

  handlers:
    - name: Start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
