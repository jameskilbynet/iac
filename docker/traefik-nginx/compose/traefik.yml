---
services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${INSTALL_DIR}/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${INSTALL_DIR}/traefik/acme.json:/acme/acme.json
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      # Dashboard (optional) — access at https://traefik.${DOMAIN}
      traefik.http.routers.dashboard.rule: Host(`traefik.${DOMAIN}`)
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.tls.certresolver: cloudflare
      traefik.http.routers.dashboard.tls.domains[0].main: "${DOMAIN}"
      traefik.http.routers.dashboard.tls.domains[0].sans: "*.${DOMAIN}"
      traefik.http.routers.dashboard.service: api@internal
      # Global HTTP → HTTPS redirect
      traefik.http.routers.http-catchall.rule: HostRegexp(`.+`)
      traefik.http.routers.http-catchall.entrypoints: web
      traefik.http.routers.http-catchall.middlewares: redirect-to-https
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
      traefik.http.middlewares.redirect-to-https.redirectscheme.permanent: "true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: traefik

networks:
  traefik:
    name: traefik
    driver: bridge
