---
services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /vcf:/usr/share/nginx/html:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.nginx.rule: Host(`vcf.${DOMAIN}`)
      traefik.http.routers.nginx.entrypoints: websecure
      traefik.http.routers.nginx.tls.certresolver: cloudflare
      traefik.http.routers.nginx.tls.domains[0].main: "${DOMAIN}"
      traefik.http.routers.nginx.tls.domains[0].sans: "*.${DOMAIN}"
      traefik.http.services.nginx.loadbalancer.server.port: "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: nginx-web

networks:
  traefik:
    external: true
