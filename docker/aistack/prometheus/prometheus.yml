global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: '{{ aistack_namespace }}'
    environment: '{{ otel_environment | default("homelab") }}'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
# rule_files:
#   - "alert.rules"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 10s

  # Jaeger v2 metrics (Prometheus endpoint on port 8888)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:8888']
    scrape_interval: 30s

  # NVIDIA GPU Exporter (nvidia-smi based metrics)
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']
    scrape_interval: 15s

  # Ollama metrics (via polling exporter sidecar)
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama-exporter:9394']
    scrape_interval: 15s

  # Traefik metrics (from main traefik instance)
  # NOTE: Requires adding metrics.prometheus config to Traefik's traefik.yml:
  #   metrics:
  #     prometheus:
  #       addEntryPointsLabels: true
  #       addRoutersLabels: true
  #       addServicesLabels: true
  #       entryPoint: metrics
  #   entryPoints:
  #     metrics:
  #       address: ":8082"
  # - job_name: 'traefik'
  #   static_configs:
  #     - targets: ['traefik:8082']
  #   scrape_interval: 30s