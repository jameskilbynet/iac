# ============================================================================
# LANGFUSE LAYER
# Self-contained LLM observability platform with its own data stores
# ============================================================================
services:
  # Langfuse Web - LLM observability platform (UI + API)
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: ${AISTACK_NAMESPACE}-langfuse-web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${LANGFUSE_BASE_URL:-https://langfuse.${DOMAIN}}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_TELEMETRY_ENABLED=false
      - LANGFUSE_LOG_LEVEL=info
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # ── Bootstrap (applied once on first start, ignored thereafter) ──────
      # Pre-creates an org, project, and admin user so the stack is usable
      # immediately without manual UI setup. The project keys must match
      # LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY used by Open WebUI + Pipelines.
      - LANGFUSE_INIT_ORG_ID=${LANGFUSE_INIT_ORG_ID:-aistack}
      - LANGFUSE_INIT_ORG_NAME=${LANGFUSE_INIT_ORG_NAME:-AI Stack}
      - LANGFUSE_INIT_PROJECT_ID=${LANGFUSE_INIT_PROJECT_ID:-aistack-default}
      - LANGFUSE_INIT_PROJECT_NAME=${LANGFUSE_INIT_PROJECT_NAME:-AI Stack}
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_INIT_USER_EMAIL}
      - LANGFUSE_INIT_USER_NAME=${LANGFUSE_INIT_USER_NAME:-admin}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_USER_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-langfuse.rule=Host(`langfuse.${DOMAIN}`)"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-langfuse.entrypoints=websecure"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-langfuse.tls=true"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-langfuse.tls.certresolver=cloudflare"
      - "traefik.http.services.${AISTACK_NAMESPACE}-langfuse.loadbalancer.server.port=3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Langfuse Worker - Background trace processing and job queue
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: ${AISTACK_NAMESPACE}-langfuse-worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - aistack-internal
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_TELEMETRY_ENABLED=false
      - LANGFUSE_LOG_LEVEL=info
      - PORT=3030
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=false"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ClickHouse - Analytics database for Langfuse trace storage
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: ${AISTACK_NAMESPACE}-clickhouse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8123/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    networks:
      - aistack-internal
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - clickhouse_data:/var/lib/clickhouse
    labels:
      - "traefik.enable=false"

  # Redis - In-memory data store for Langfuse job queues
  redis:
    image: redis:7-alpine
    container_name: ${AISTACK_NAMESPACE}-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true
    networks:
      - aistack-internal
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - redis_data:/data
    labels:
      - "traefik.enable=false"

  # MinIO - S3-compatible object storage for Langfuse event uploads
  minio:
    image: minio/minio:latest
    container_name: ${AISTACK_NAMESPACE}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    networks:
      - aistack-internal
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - minio_data:/data
    labels:
      - "traefik.enable=false"

  # MinIO bucket init - creates the langfuse bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: ${AISTACK_NAMESPACE}-minio-init
    entrypoint: |
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        sleep 2
      done
      mc mb --ignore-existing local/langfuse
      echo 'Bucket created successfully'
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    networks:
      - aistack-internal
    depends_on:
      minio:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"

networks:
  traefik:
    external: true
  aistack-internal:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: ${AISTACK_INTERNAL_SUBNET:-172.30.0.0/24}

volumes:
  clickhouse_data:
  redis_data:
  minio_data:
