# ============================================================================
# AUTOMATION LAYER
# Workflow automation and orchestration
# ============================================================================
services:
  # n8n - Workflow automation
  n8n:
    image: n8nio/n8n:2.11.0
    container_name: ${AISTACK_NAMESPACE}-n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${N8N_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - OLLAMA_HOST=ollama:11434
      - WEBHOOK_URL=https://n8n.${DOMAIN}
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-n8n.entrypoints=websecure"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-n8n.tls=true"
      - "traefik.http.routers.${AISTACK_NAMESPACE}-n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.${AISTACK_NAMESPACE}-n8n.loadbalancer.server.port=5678"
    depends_on:
      postgres:
        condition: service_started
      ollama:
        condition: service_started

networks:
  traefik:
    external: true
  aistack-internal:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: ${AISTACK_INTERNAL_SUBNET:-172.30.0.0/24}

volumes:
  n8n_data:
