# ============================================================================
# AI Stack - Docker Compose Orchestrator
# ============================================================================
# Thin orchestrator that includes all layer-specific compose files.
# Uses Docker Compose 'include' (v2.20+) to merge everything into a single
# project while keeping each layer in its own file for readability.
#
# Layer overview:
#   inference     - GPU model serving: Ollama, ComfyUI, Whishper, MongoDB
#   data          - Shared data infra: PostgreSQL, Qdrant, Tika, SearxNG
#   langfuse      - LLM observability: Langfuse web/worker, ClickHouse, Redis, MinIO
#   observability - Tracing & metrics: Jaeger, OTel Collector, Prometheus, Grafana
#   routing       - LLM routing: SmarterRouter
#   interface     - User-facing UIs: Open WebUI, Open Terminal, Pipelines
#   automation    - Workflow engine: n8n
#
# Include order matters for readability but not for resolution —
# Docker Compose resolves all includes before evaluating depends_on.
# ============================================================================

include:
  # Foundation layers (no cross-layer deps)
  - path: compose/inference.yml
  - path: compose/data.yml
  - path: compose/observability.yml

  # Depends on data + observability
  - path: compose/langfuse.yml

  # Depends on inference
  - path: compose/routing.yml

  # Depends on inference + data + observability + langfuse
  - path: compose/interface.yml

  # Depends on inference + data
  - path: compose/automation.yml