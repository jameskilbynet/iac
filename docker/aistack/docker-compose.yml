services:
  # Ollama with OpenTelemetry support
  ollama:
    image: ollama/ollama:0.17.0
    container_name: aistack-ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "sleep 30 && exec ollama serve"]
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 4G
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_ORIGINS=https://ollama.example.com,https://chat.example.com,https://n8n.example.com
      - ENABLE_IMAGE_GENERATION=True
      - COMFYUI_BASE_URL=http://comfyui:8188
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_NUM_GPU=1
      - OLLAMA_DEBUG=0
      - CUDA_MODULE_LOADING=LAZY
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=f16
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/root/.ollama
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=Host(`ollama.example.com`)"
      - "traefik.http.routers.ollama.entrypoints=websecure"
      - "traefik.http.routers.ollama.tls=true"
      - "traefik.http.routers.ollama.tls.certresolver=cloudflare"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      - "traefik.http.routers.ollama.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${OLLAMA_API_CREDENTIALS}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ollama_models:/root/.ollama

  # Open WebUI with OpenTelemetry support
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.5
    container_name: aistack-open-webui
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=10
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://ollama:11434/v1
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - TIKA_SERVER_URL=http://tika:9998
      - WEBUI_NAME=AI Stack
      - WEBUI_URL=https://chat.example.com
      - ENABLE_SIGNUP=false
      - DEFAULT_USER_ROLE=user
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=comfyui
      - COMFYUI_BASE_URL=http://comfyui:8188
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://whishper:8082/v1
      - ENABLE_COMMUNITY_SHARING=false
      - TASK_MODEL=${INFERENCE_TEXT_MODEL:-llama3.1:8b}
      - ENABLE_ADMIN_EXPORT=true
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - openwebui_data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`chat.example.com`)"
      - "traefik.http.routers.open-webui.entrypoints=websecure"
      - "traefik.http.routers.open-webui.tls=true"
      - "traefik.http.routers.open-webui.tls.certresolver=cloudflare"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
      - "kuma.openwebui.http.name=Open WebUI"
      - "kuma.openwebui.http.url=https://chat.example.com/"
      - "kuma.openwebui.http.interval=60"
    depends_on:
      - ollama
      - qdrant
      - tika
      - searxng
    extra_hosts:
      - host.docker.internal:host-gateway

  # ComfyUI - Image generation
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: aistack-comfyui
    restart: unless-stopped
    networks:
      - traefik
      - aistack-internal
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - WEB_ENABLE_AUTH=false
      - SERVERURL=https://comfyui.example.com
      - DIRECT_ADDRESS=comfyui.example.com
      - DIRECT_ADDRESS_GET_WAN=false
      - CF_QUICK_TUNNELS=false
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: '6.0'
        reservations:
          memory: 4G
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - comfyui_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.comfyui.rule=Host(`comfyui.example.com`)"
      - "traefik.http.routers.comfyui.entrypoints=websecure"
      - "traefik.http.routers.comfyui.tls=true"
      - "traefik.http.routers.comfyui.tls.certresolver=cloudflare"
      - "traefik.http.services.comfyui.loadbalancer.server.port=8188"
      - "kuma.comfyui.http.name=ComfyUI"
      - "kuma.comfyui.http.url=https://comfyui.example.com/"
      - "kuma.comfyui.http.interval=60"

  # Whishper - Whisper transcription service
  whishper:
    image: pluja/whishper:v3.1.4
    container_name: aistack-whishper
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - WHISPER_MODELS=${WHISPER_MODELS:-base}
      - WHISPER_MODELS_DIR=/app/models
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - whishper_data:/app/data
      - whishper_models:/app/models
      - whishper_logs:/var/log/whishper
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whishper.rule=Host(`whishper.example.com`)"
      - "traefik.http.routers.whishper.entrypoints=websecure"
      - "traefik.http.routers.whishper.tls=true"
      - "traefik.http.routers.whishper.tls.certresolver=cloudflare"
      - "traefik.http.services.whishper.loadbalancer.server.port=8082"
      - "kuma.whishper.http.name=Whishper"
      - "kuma.whishper.http.url=https://whishper.example.com/"
      - "kuma.whishper.http.interval=60"

  # n8n - Workflow automation
  n8n:
    image: n8nio/n8n:2.10.0
    container_name: aistack-n8n
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - OLLAMA_HOST=ollama:11434
      - WEBHOOK_URL=https://n8n.example.com
      - N8N_HOST=n8n.example.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.example.com`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "kuma.n8n.http.name=n8n"
      - "kuma.n8n.http.url=https://n8n.example.com/"
      - "kuma.n8n.http.interval=60"
    depends_on:
      - postgres
      - ollama
      - qdrant

  # PostgreSQL - Relational database
  postgres:
    image: postgres:16.12-alpine
    container_name: aistack-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - postgres_data:/var/lib/postgresql/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.postgres.rule=Host(`postgres.example.com`)"
      - "traefik.http.routers.postgres.entrypoints=websecure"
      - "traefik.http.routers.postgres.tls=true"
      - "traefik.http.routers.postgres.tls.certresolver=cloudflare"
      - "traefik.http.services.postgres.loadbalancer.server.port=5432"

  # Qdrant - Vector database for RAG
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: aistack-qdrant
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - qdrant_storage:/qdrant/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.example.com`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant.tls=true"
      - "traefik.http.routers.qdrant.tls.certresolver=cloudflare"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
      - "kuma.qdrant.http.name=Qdrant"
      - "kuma.qdrant.http.url=https://qdrant.example.com/"
      - "kuma.qdrant.http.interval=60"

  # Apache Tika - Document parsing for RAG
  tika:
    image: apache/tika:2.5.0
    container_name: aistack-tika
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tika.rule=Host(`tika.example.com`)"
      - "traefik.http.routers.tika.entrypoints=websecure"
      - "traefik.http.routers.tika.tls=true"
      - "traefik.http.routers.tika.tls.certresolver=cloudflare"
      - "traefik.http.services.tika.loadbalancer.server.port=9998"

  # SearxNG
  searxng:
    image: searxng/searxng:2026.2.23-4964d664f
    container_name: aistack-searxng
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - SEARXNG_BASE_URL=https://searxng.example.com
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /opt/aistack/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  # Jaeger - Distributed tracing backend
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: aistack-jaeger
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - jaeger_data:/badger
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`jaeger.example.com`)"
      - "traefik.http.routers.jaeger.entrypoints=websecure"
      - "traefik.http.routers.jaeger.tls=true"
      - "traefik.http.routers.jaeger.tls.certresolver=cloudflare"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"
      - "kuma.jaeger.http.name=Jaeger"
      - "kuma.jaeger.http.url=https://jaeger.example.com/"
      - "kuma.jaeger.http.interval=60"

  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:v3.5.1
    container_name: aistack-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /opt/aistack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.example.com`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.tls.certresolver=cloudflare"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "kuma.aistackprometheus.http.name=AI Stack Prometheus"
      - "kuma.aistackprometheus.http.url=https://prometheus.example.com/"
      - "kuma.aistackprometheus.http.interval=60"

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:12.3.4
    container_name: aistack-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
      - aistack-internal
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.example.com
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
        tag: "{{.ImageName}}|{{.Name}}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - grafana_data:/var/lib/grafana
      - /opt/aistack/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.example.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "kuma.aistackgrafana.http.name=AI Stack Grafana"
      - "kuma.aistackgrafana.http.url=https://grafana.example.com/"
      - "kuma.aistackgrafana.http.interval=60"
    depends_on:
      - prometheus
      - jaeger

networks:
  traefik:
    external: true
  aistack-internal:
    driver: bridge
    internal: false
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/16

volumes:
  # Local model storage for Ollama (faster access)
  ollama_models:
  
  # Open WebUI data - local volume (SQLite requires local filesystem)
  openwebui_data:
  
  # ComfyUI data - local volume
  comfyui_data:
  
  # Whishper data and models - local volumes
  whishper_data:
  whishper_models:
  whishper_logs:
  
  # Qdrant vector database storage
  qdrant_storage:
  
  # PostgreSQL database storage
  postgres_data:
  
  # n8n workflow data
  n8n_data:
  
  # Monitoring Data Volumes (SMB for persistence)
  jaeger_data:
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,file_mode=0777,dir_mode=0777"
      device: "//${SMB_SERVER}/${SMB_SHARE}/aistack/jaeger"
  
  prometheus_data:
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,file_mode=0777,dir_mode=0777"
      device: "//${SMB_SERVER}/${SMB_SHARE}/aistack/prometheus"
  
  grafana_data:
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,file_mode=0777,dir_mode=0777"
      device: "//${SMB_SERVER}/${SMB_SHARE}/aistack/grafana"
  
  prometheus_config:
    driver_opts:
      type: cifs
      o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,file_mode=0777,dir_mode=0777"
      device: "//${SMB_SERVER}/${SMB_SHARE}/aistack/prometheus-config"
  