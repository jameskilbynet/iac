---
# ---------------------------------------------------------------------------
# Cloudflare WARP Connector — role tasks
# ---------------------------------------------------------------------------

# -- Prerequisites -----------------------------------------------------------

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# -- Cloudflare apt repository -----------------------------------------------

- name: Download Cloudflare GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg |
      gpg --yes --dearmor --output {{ warp_gpg_keyring }}
    creates: "{{ warp_gpg_keyring }}"

- name: Set correct permissions on GPG keyring
  ansible.builtin.file:
    path: "{{ warp_gpg_keyring }}"
    owner: root
    group: root
    mode: "0644"

- name: Add Cloudflare WARP apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by={{ warp_gpg_keyring }}]
      https://pkg.cloudflareclient.com/
      {{ ansible_distribution_release }} main
    filename: cloudflare-client
    state: present
    update_cache: true

# -- Package install ---------------------------------------------------------

- name: Install cloudflare-warp
  ansible.builtin.apt:
    name: cloudflare-warp
    state: present
  notify: Restart warp-svc

# -- Service -----------------------------------------------------------------

- name: Enable and start warp-svc
  ansible.builtin.systemd:
    name: warp-svc
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for warp-svc to be ready
  ansible.builtin.wait_for:
    timeout: 5

# -- Registration ------------------------------------------------------------

- name: Check current WARP registration status
  ansible.builtin.command: warp-cli status
  register: warp_status
  changed_when: false
  failed_when: false

- name: Register WARP connector with token
  ansible.builtin.command: warp-cli connector new {{ warp_connector_token }}
  when: >
    warp_status.rc != 0 or
    'registered' not in warp_status.stdout | lower
  no_log: true  # token is sensitive

- name: Connect WARP connector
  ansible.builtin.command: warp-cli connect
  when: >
    warp_status.rc != 0 or
    'connected' not in warp_status.stdout | lower
  register: warp_connect_result
  changed_when: warp_connect_result.rc == 0

# -- IP forwarding -----------------------------------------------------------

- name: Enable IPv4 forwarding (persistent)
  ansible.builtin.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  when: warp_ip_forward | bool

# -- Verify ------------------------------------------------------------------

- name: Get final WARP status
  ansible.builtin.command: warp-cli status
  register: warp_final_status
  changed_when: false

- name: Show WARP status
  ansible.builtin.debug:
    msg: "{{ warp_final_status.stdout_lines }}"

- name: Assert connector is connected
  ansible.builtin.assert:
    that: "'connected' in warp_final_status.stdout | lower"
    fail_msg: "WARP connector did not reach Connected state. Check 'warp-cli status' on the host."
    success_msg: "WARP connector is Connected."
