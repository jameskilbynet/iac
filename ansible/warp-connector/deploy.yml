---
# ---------------------------------------------------------------------------
# Cloudflare WARP Connector — deploy playbook
#
# Runs locally on the target host (the WARP connector VM itself). The
# Semaphore worker / runner must be the host you want to turn into a
# connector — no SSH inventory needed.
#
# Variables (pass via Semaphore Variable Group or -e on CLI):
#   warp_connector_token   Token from Zero Trust → Networks → WARP Connector
#                          (mark as secret in Semaphore)
# ---------------------------------------------------------------------------

- name: Deploy Cloudflare WARP Connector
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  pre_tasks:
    - name: Verify token is set
      ansible.builtin.assert:
        that:
          - warp_connector_token is defined
          - warp_connector_token | length > 0
        fail_msg: >
          warp_connector_token is not set. Pass it via Semaphore Variable Group
          (marked secret) or with -e warp_connector_token=...

    - name: Verify Ubuntu is the target OS
      ansible.builtin.assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook targets Ubuntu. Found: {{ ansible_distribution }}"

  roles:
    - warp_connector
