---
# Backup MikroTik switch configurations and commit to git
#
# Saves one compact .rsc file per device (no timestamps in filenames)
# so git tracks changes as clean diffs over time.
#
# Usage:
#   ansible-playbook -i inventory.yml backup_config.yml
#   ansible-playbook -i inventory.yml backup_config.yml --limit mikrotik-sw-1

- name: Backup MikroTik configurations and commit to git
  hosts: mikrotik_switches
  gather_facts: no

  vars:
    backup_dir: "{{ playbook_dir }}/configs"
    git_repo_root: "{{ playbook_dir | regex_replace('/ansible/mikrotik$', '') }}"

  tasks:
    - name: Ensure backup directory exists
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'
      run_once: true

    - name: Export compact configuration
      community.routeros.command:
        commands:
          - /export compact
      register: config_export

    - name: Get system identity
      community.routeros.command:
        commands:
          - /system identity print
      register: system_identity

    - name: Save configuration to file
      delegate_to: localhost
      ansible.builtin.copy:
        content: |
          # Device: {{ inventory_hostname }} ({{ ansible_host }})
          # Identity: {{ system_identity.stdout[0] | default('Unknown') }}
          # Exported: {{ '%Y-%m-%d %H:%M:%S' | strftime }}
          #
          {{ config_export.stdout[0] }}
        dest: "{{ backup_dir }}/{{ inventory_hostname }}.rsc"
        mode: '0644'

    - name: Stage and commit config changes to git
      delegate_to: localhost
      run_once: true
      block:
        - name: Stage backup files
          ansible.builtin.command:
            cmd: git add configs/
            chdir: "{{ playbook_dir }}"

        - name: Check for staged changes
          ansible.builtin.command:
            cmd: git diff --cached --quiet configs/
            chdir: "{{ playbook_dir }}"
          register: git_diff
          failed_when: false
          changed_when: git_diff.rc == 1

        - name: Commit config backup
          ansible.builtin.command:
            cmd: >-
              git commit -m "backup: MikroTik config {{ '%Y-%m-%d %H:%M' | strftime }}"
            chdir: "{{ git_repo_root }}"
          when: git_diff.rc == 1

        - name: Report no changes
          ansible.builtin.debug:
            msg: "No configuration changes detected — nothing to commit."
          when: git_diff.rc == 0
