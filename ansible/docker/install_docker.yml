---
- name: Install Docker on supported Ubuntu hosts
  hosts: all
  become: yes
  vars:
    docker_gpg_path: /etc/apt/keyrings/docker.gpg
    docker_gpg_url: https://download.docker.com/linux/ubuntu/gpg
    docker_gpg_armored_path: /etc/apt/keyrings/docker.asc
    allow_reboot: false

  pre_tasks:
    - name: Verify target is Ubuntu
      ansible.builtin.assert:
        that: ansible_distribution == "Ubuntu"
        fail_msg: "This playbook only supports Ubuntu (found {{ ansible_distribution }})"

    - name: Detect system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Set Docker repository URL
      ansible.builtin.set_fact:
        docker_repo: "deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_gpg_path }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

  tasks:
    - name: Ensure required system packages are present
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot the machine if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible due to package upgrade."
        pre_reboot_delay: 60
        reboot_timeout: 600
        post_reboot_delay: 60
      when: reboot_required.stat.exists and allow_reboot | bool

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_gpg_armored_path }}"
        mode: '0644'
        force: false

    - name: Dearmor Docker GPG key
      ansible.builtin.command: gpg --dearmor -o {{ docker_gpg_path }} {{ docker_gpg_armored_path }}
      args:
        creates: "{{ docker_gpg_path }}"

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: "{{ docker_gpg_path }}"
        mode: '0644'

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_repo }}"
        filename: docker
        state: present

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker Engine and related packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
      notify: Start Docker service

  handlers:
    - name: Start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
