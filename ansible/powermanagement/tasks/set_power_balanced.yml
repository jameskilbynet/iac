---
- name: Gather all ESXi hosts from vCenter
  community.vmware.vmware_host_info:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ validate_certs }}"
  register: host_info

- name: Set power management policy to Balanced on all hosts
  community.vmware.vmware_host_powermgmt_policy:
    hostname: "{{ vcenter_hostname }}"
    username: "{{ vcenter_username }}"
    password: "{{ vcenter_password }}"
    validate_certs: "{{ validate_certs }}"
    esxi_hostname: "{{ item }}"
    policy: balanced
  loop: "{{ host_info.hosts_info.keys() | list }}"
  register: power_results

- name: Display results
  ansible.builtin.debug:
    msg: "Power policy on {{ item.item }} set to Balanced"
  loop: "{{ power_results.results }}"
  when: item.changed
