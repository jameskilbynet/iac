---
- name: Bootstrap and run power management playbook
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Install collection and patch compatibility
      ansible.builtin.shell: |
        ansible-galaxy collection install community.vmware --force -p /tmp/vmware_collections 2>&1
        MANIFEST="/tmp/vmware_collections/ansible_collections/community/vmware/MANIFEST.json"
        if [ -f "$MANIFEST" ]; then
          sed -i 's/"requires_ansible": ".*"/"requires_ansible": ">=2.15.0"/' "$MANIFEST"
          echo "Patched MANIFEST.json requires_ansible constraint"
        fi
        META="/tmp/vmware_collections/ansible_collections/community/vmware/meta/runtime.yml"
        if [ -f "$META" ]; then
          sed -i 's/requires_ansible: .*/requires_ansible: ">=2.15.0"/' "$META"
          echo "Patched meta/runtime.yml requires_ansible constraint"
        fi

    - name: Write extra vars file
      ansible.builtin.copy:
        content: |
          vcenter_host: "{{ vcenter_host }}"
          vcenter_user: "{{ vcenter_user }}"
          vcenter_pass: "{{ vcenter_pass }}"
        dest: /tmp/.powermgmt_vars.yml
        mode: "0600"
      no_log: true

    - name: Run Set Power Low playbook
      ansible.builtin.shell: |
        echo "=== Host modules ==="
        ls /tmp/vmware_collections/ansible_collections/community/vmware/plugins/modules/vmware_host* 2>&1
        echo "=== Power modules ==="
        ls /tmp/vmware_collections/ansible_collections/community/vmware/plugins/modules/*power* 2>&1 || echo "No power modules"
        echo "=== Redirects ==="
        grep -A2 "vmware_host_info" /tmp/vmware_collections/ansible_collections/community/vmware/meta/runtime.yml 2>&1 || echo "No redirects found"
      register: playbook_result
      ignore_errors: true

    - name: Clean up vars file
      ansible.builtin.file:
        path: /tmp/.powermgmt_vars.yml
        state: absent

    - name: Show playbook output
      ansible.builtin.debug:
        msg: "{{ playbook_result.stdout_lines }}"
