---
- name: Bootstrap and run power management playbook
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Install collection and run playbook
      ansible.builtin.shell: |
        set -ex
        ansible-galaxy collection install community.vmware -p /tmp/collections 2>&1
        echo "--- Collection directory contents ---"
        ls -la /tmp/collections/ansible_collections/community/vmware/ 2>&1 || echo "Directory not found"
        ls -la /tmp/collections/ansible_collections/community/vmware/plugins/modules/ 2>&1 || echo "Modules dir not found"
        echo "--- Checking env var ---"
        echo "ANSIBLE_COLLECTIONS_PATH=/tmp/collections"
        echo "--- Running playbook ---"
        export ANSIBLE_COLLECTIONS_PATH=/tmp/collections
        ansible-playbook {{ playbook_dir }}/set_power_low.yml \
          -e "vcenter_host={{ vcenter_host }}" \
          -e "vcenter_user={{ vcenter_user }}" \
          -e "vcenter_pass={{ vcenter_pass }}" 2>&1
      register: result
      no_log: true

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ result.stdout_lines }}"
