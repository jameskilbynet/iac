---
- name: Bootstrap and run power management playbook
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Install collection and verify
      ansible.builtin.shell: |
        set -ex
        ansible-galaxy collection install community.vmware --force -p /tmp/vmware_collections 2>&1
        echo "--- Collection directory contents ---"
        ls -la /tmp/vmware_collections/ansible_collections/community/vmware/ 2>&1 || echo "Directory not found"
        echo "--- Modules directory ---"
        ls /tmp/vmware_collections/ansible_collections/community/vmware/plugins/modules/ 2>&1 || echo "Modules dir not found"
      register: install_result

    - name: Show install output
      ansible.builtin.debug:
        msg: "{{ install_result.stdout_lines }}"

    - name: Write extra vars file
      ansible.builtin.copy:
        content: |
          vcenter_host: "{{ vcenter_host }}"
          vcenter_user: "{{ vcenter_user }}"
          vcenter_pass: "{{ vcenter_pass }}"
        dest: /tmp/.powermgmt_vars.yml
        mode: "0600"
      no_log: true

    - name: Run Set Power Low playbook
      ansible.builtin.shell: |
        export ANSIBLE_COLLECTIONS_PATH=/tmp/vmware_collections
        ansible-playbook {{ playbook_dir }}/set_power_low.yml -e @/tmp/.powermgmt_vars.yml 2>&1
      register: playbook_result
      ignore_errors: true

    - name: Clean up vars file
      ansible.builtin.file:
        path: /tmp/.powermgmt_vars.yml
        state: absent

    - name: Show playbook output
      ansible.builtin.debug:
        msg: "{{ playbook_result.stdout_lines }}"
