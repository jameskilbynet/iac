---
- name: Debug collection environment
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Show ANSIBLE_COLLECTIONS_PATH
      ansible.builtin.debug:
        msg: "ANSIBLE_COLLECTIONS_PATH={{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') }}"

    - name: Show HOME
      ansible.builtin.debug:
        msg: "HOME={{ lookup('env', 'HOME') }}"

    - name: Check default collections directory
      ansible.builtin.command: ls -la ~/.ansible/collections/ansible_collections/
      register: default_dir
      ignore_errors: true

    - name: Show default collections directory
      ansible.builtin.debug:
        var: default_dir.stdout_lines

    - name: Check project collections directory
      ansible.builtin.command: find /tmp/semaphore -name "vmware" -type d 2>/dev/null
      register: find_result
      ignore_errors: true

    - name: Show find results
      ansible.builtin.debug:
        var: find_result.stdout_lines

    - name: Show ansible config
      ansible.builtin.command: ansible-config dump | grep -i collection
      register: config_result
      ignore_errors: true

    - name: Show config
      ansible.builtin.debug:
        var: config_result.stdout_lines
