---
- name: Install required collections
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Install community.vmware collection
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.vmware -p "{{ playbook_dir }}/collections"
      register: galaxy_result
      changed_when: "'was installed successfully' in galaxy_result.stdout"

- name: Set vSphere host power management policy to Low Power
  hosts: localhost
  gather_facts: no
  vars:
    vcenter_hostname: "{{ vcenter_host }}"
    vcenter_username: "{{ vcenter_user }}"
    vcenter_password: "{{ vcenter_pass }}"
    validate_certs: false
  tasks:
    - name: Apply Low Power policy to all hosts
      ansible.builtin.include_tasks: tasks/set_power_low.yml
