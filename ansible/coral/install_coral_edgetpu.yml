---
- name: Install Google Coral Edge TPU runtime
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
    coral_gpg_path: /etc/apt/keyrings/coral-edgetpu.gpg
    coral_repo: "deb [signed-by={{ coral_gpg_path }}] https://packages.cloud.google.com/apt coral-edgetpu-stable main"

  tasks:
    - name: Ensure required system packages are present
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Ensure /etc/apt/keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Google Coral GPG key in dearmored format
      shell: |
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o {{ coral_gpg_path }}
      args:
        creates: "{{ coral_gpg_path }}"

    - name: Set permissions on Coral GPG key
      file:
        path: "{{ coral_gpg_path }}"
        mode: '0644'

    - name: Add Coral Edge TPU APT repository
      apt_repository:
        repo: "{{ coral_repo }}"
        filename: coral-edgetpu
        state: present

    - name: Update APT cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Edge TPU standard runtime
      apt:
        name:
          - libedgetpu1-std
        state: present
